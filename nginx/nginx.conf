events {
    worker_connections 1024;
}

http {
    client_max_body_size 5M;

    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # --- Define the Rate Limit Zone ---
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=heavy_limit:10m rate=1r/s;


    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        error_page 503 /503.html;

        location /portal-206-987-secure/ {
            limit_req zone=mylimit burst=5 nodelay;
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- CORRECTED: Only ONE Static Block ---
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
        }

        # --- CORRECTED: Only ONE Media Block ---
        location /media/ {
            alias /app/media/; 
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        location /api/ {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cookie_path / /;
        }

        location / {
            limit_req zone=mylimit burst=150 nodelay;
            proxy_pass http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            # proxy_set_header Upgrade $http_upgrade;
            # proxy_set_header Connection "upgrade";
        }
    }
}